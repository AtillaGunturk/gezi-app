plugins {
    id 'com.android.application'
}

android {
    namespace "com.atilla.gunturk.geziharitam"
    compileSdk 34

    defaultConfig {
        applicationId "com.atilla.gunturk.geziharitam"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }


    signingConfigs {
        release {
            // gradle.properties dosyasından okunuyor
            storeFile =../android/debug.keystore
            storePassword project.property("MY_STORE_PASSWORD")
            keyAlias project.property("MY_KEY_ALIAS")
            keyPassword project.property("MY_KEY_PASSWORD")
            v1SigningEnabled true   // isteğe bağlı ama açık olsun
            v2SigningEnabled true
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release   // <── ÖNEMLİ
            minifyEnabled false
        }
    }



    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.7.0'
    implementation 'com.google.android.material:material:1.9.0'
}
