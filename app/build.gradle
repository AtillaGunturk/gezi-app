plugins { id 'com.android.application' }

android {
    
    compileSdk 34
    namespace 'com.atilla.geziharitam'

    defaultConfig {
        applicationId "com.atilla.geziharitam"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Eğer asset klasöründeki html dosyalarını WebView'de göstereceksen:
        // assets/index.html gibi
      //  assetDirectories = ['src/main/assets']
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
repositories {          // ← EKLE
    google()
    mavenCentral()
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.7.0' // WebView için
}
