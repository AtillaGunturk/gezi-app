name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Kodu çek
      - uses: actions/checkout@v4

      # 2) JDK 17
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3) Android SDK
      - uses: android-actions/setup-android@v3

      # 4) Gradle cache + wrapper (cache devre dışı → log temiz)
      - uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: .
          cache-disabled: true      # <- geçici olarak kapat

      # 5) Manifest adımı – ayrıntılı LOG
      - name: Manifesti ayrıntılı işle
        working-directory: .
        run: |
          chmod +x gradlew
          ./gradlew :app:processReleaseMainManifest \
                     --no-daemon \
                     --stacktrace \
                     --info \
                     --debug

      # 6) APK oluştur (manifest geçerse)
      - name: Assemble Release
        if: ${{ success() }}
        working-directory: .
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
                     --no-daemon \
                     --stacktrace \
                     --info

      # 7) APK'yı çıktı olarak yükle
      - uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: gezi-apk
          path: app/build/outputs/apk/release/app-release.apk
