name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ──📥 Kaynak kodu al ──────────────────────────────────────────
      - name: Kodu çek
        uses: actions/checkout@v4

      # ──☕ JDK kurulumu ────────────────────────────────────────────
      - name: JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ──🤖 Android SDK ─────────────────────────────────────────────
      - name: Android SDK Kur
        uses: android-actions/setup-android@v3

      # ──⚡ Gradle cache (devre dışı) ───────────────────────────────
      - name: Gradle Cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # ──📜 Manifesti işle (sadece log) ────────────────────────────
      - name: Manifesti işle (log için)
        run: |
          chmod +x gradlew
          ./gradlew :app:processReleaseMainManifest \
                     --no-daemon \
                     --stacktrace \
                     --info \
                     --debug | tail -n 100

      # ──🔑 Keystore'u diske yaz ───────────────────────────────────
      - name: Keystore dosyasını oluştur
        run: |
          mkdir -p android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > android/debug.keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      # ──🔑 Parolaları gradle.properties'e ekle ────────────────────
      - name: gradle.properties içine parolaları yaz
        run: |
          cat <<EOF >> gradle.properties
          MY_STORE_FILE=android/debug.keystore
          MY_STORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          MY_KEY_ALIAS=${DEBUG_KEY_ALIAS}
          MY_KEY_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          EOF
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      # ──🏗️  Release APK oluştur ───────────────────────────────────
      - name: Release APK oluştur
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
                     --no-daemon \
                     --stacktrace \
                     --info

      # ──🔍 Oluşturulan dosyaları listele ──────────────────────────
      - name: Üretilen APK'yı tara
        run: find app/build/outputs -type f | grep -E '\.(apk|aab)$' || true

      # ──⬆️  İmzalı APK'yı yükle ───────────────────────────────────
      - name: APK'yı upload et
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-apk
          path:app/build/outputs/apk/release/app-release.apk
