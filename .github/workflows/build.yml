name: Build APK
on:
  push: {branches: [main]}
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - uses: android-actions/setup-android@v3   # SDK yüklendi

    #  🔹 Gradle wrapper KULLANMADAN derle
    - uses: gradle/gradle-build-action@v3
      with:
        arguments: assembleRelease          # ← APK üret
        build-root-directory: .             # projeni kökten derle

    #  🔹 APK’yı artefakt olarak kaydet
    - uses: actions/upload-artifact@v4
      with:
        name: gezi-apk
        path: app/build/outputs/apk/release/app-release.apk
