name: Build APK

on:
  push:
    branches: [main, develop, feature/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Kodu çek
        uses: actions/checkout@v4

      - name: 2 - JDK 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 3 - Android SDK kurulumu
        uses: android-actions/setup-android@v3

      - name: 4 - Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: 5 - Gradle Wrapper’a çalıştırma izni ver
        run: chmod +x ./gradlew

      - name: 6 - Keystore dosyasını yaz
        working-directory: app
        run: |
          mkdir -p android
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 -d > android/debug.keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      - name: 7 - APK derle (log ile birlikte)
        run: ./gradlew clean :app:assembleRelease --stacktrace --no-daemon | tee build.log
        env:
          MY_STORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          MY_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 8 - APK/AAB bul
        run: |
          echo "🔍 APK/AAB arama..."
          find app/build/outputs -name "*.apk" || true
          find app/build/outputs -name "*.aab" || true

      - name: 9 - APK/AAB dosyalarını yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-output
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: 10 - build.log dosyasını yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
