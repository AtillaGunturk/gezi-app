name: Build APK

on:
  push:
    branches: [main, develop, feature/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Kodu çek
        uses: actions/checkout@v4

      - name: 2 - JDK 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 3 - Android SDK kurulumu
        uses: android-actions/setup-android@v3

      - name: 4 - Gradle cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: 5 - Secret uzunluğu kontrolü (isteğe bağlı)
        run: |
          echo "B64 len  = ${#DEBUG_KEYSTORE_B64}"
          echo "PWD len  = ${#DEBUG_KEYSTORE_PASSWORD}"
          echo "ALIAS    = ${DEBUG_KEY_ALIAS:-<EMPTY>}"
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 6 - Keystore dosyasını yaz
        working-directory: app
        run: |
          mkdir -p android
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 -d > android/debug.keystore
          ls -lh android/debug.keystore
          file android/debug.keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      - name: 7 - keytool ile keystore kontrolü
        run: |
          keytool -list -keystore app/android/debug.keystore \
            -storepass "$DEBUG_KEYSTORE_PASSWORD" \
            -keypass "$DEBUG_KEYSTORE_PASSWORD" \
            -alias "$DEBUG_KEY_ALIAS" -v | head -n 12
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 8 - gradle.properties oluştur
        working-directory: app
        run: |
          echo "MY_STORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}" > gradle.properties
          echo "MY_KEY_ALIAS=${DEBUG_KEY_ALIAS}" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 9 - Gradle Wrapper’a çalıştırma izni ver
        run: chmod +x ./gradlew

      - name: 10 - Temizlik (clean & build klasörleri)
        run: |
          ./gradlew clean
          echo "📁 Siliniyor: app/build, build, ~/.gradle/caches/"
          rm -rf app/build
          rm -rf build
          rm -rf ~/.gradle/caches

      - name: 11 - APK oluştur (assembleRelease) - Hata & Uyarı Denetimi
        run: |
          echo "🚀 Derleme başlatılıyor..."
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info > build.log 2>&1 || {
            echo "❌ Derleme başarısız oldu. Son 30 satır:"
            tail -n 30 build.log
            exit 1
          }

          echo "🧐 Warning taraması yapılıyor..."
          WARNINGS=$(grep -i "warning" build.log | grep -v "deprecation")

          if [ -n "$WARNINGS" ]; then
            echo "⚠️ Uyarılar bulundu:"
            echo "$WARNINGS" | tail -n 10
            # Eğer uyarıları da hata gibi görmek istersen aşağıdaki satırı aktif et:
            # exit 2
          else
            echo "✅ Önemli uyarı bulunamadı."
          fi
        env:
          MY_STORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          MY_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 12 - APK’yı GitHub Artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: 13 - build.log dosyasını yükle
        uses: actions/upload-artifact@v4
        if: always() # her durumda yükle (başarılı ya da değil)
        with:
          name: build-log
          path: build.log
