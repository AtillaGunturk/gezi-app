name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kaynak kodu al
      - name: Kodu çek
        uses: actions/checkout@v4

      # 2️⃣ JDK 17 kurulumu
      - name: JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Android SDK kurulumu
      - name: Android SDK Kur
        uses: android-actions/setup-android@v3

      # 4️⃣ Gradle cache (devre dışı)
      - name: Gradle Cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # 5️⃣ 🔑 Keystore dosyasını oluştur
      - name: Keystore dosyasını oluştur
        run: |
          mkdir -p android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > android/debug.keystore
          echo "✅ debug.keystore başarıyla oluşturuldu: android/debug.keystore"
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      # 6️⃣ 🔍 Keystore dosyasını doğrula
      - name: Keystore var mı?
        run: |
          if [ -f android/debug.keystore ]; then
            echo "✅ debug.keystore dosyası bulundu!"
          else
            echo "❌ debug.keystore dosyası bulunamadı!"
            exit 1
          fi

      # 7️⃣ 🔑 Parolaları gradle.properties içine yaz
      - name: gradle.properties oluştur
        run: |
          cat <<EOF > gradle.properties
          MY_STORE_FILE=android/debug.keystore
          MY_STORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          MY_KEY_ALIAS=${DEBUG_KEY_ALIAS}
          MY_KEY_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      # 8️⃣ 🧱 Release APK oluştur
      - name: Release APK oluştur
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info

      # 9️⃣ 📦 APK dosyasını yükle
      - name: APK'yı upload et
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
