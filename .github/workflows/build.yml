name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Kodu çek
        uses: actions/checkout@v4

      - name: 2 - JDK 17 kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3 - Gradle önbelleğini temizle
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: 4 - assets klasörünü oluştur ve index dosyalarını yerleştir
        run: |
          mkdir -p app/src/main/assets
          printf '%s' "${{ secrets.INDEX_HTML }}" > app/src/main/assets/index.html
          printf '%s' "${{ secrets.VERILER1_JS }}" > app/src/main/assets/veriler1.js

      - name: 5 - Keystore dosyasını oluştur
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      - name: 6 - Gradle ile APK oluştur (release)
        run: ./gradlew clean assembleRelease
        env:
          MY_KEY_ALIAS: ${{ secrets.MY_KEY_ALIAS }}
          MY_KEY_PASSWORD: ${{ secrets.MY_KEY_PASSWORD }}
          MY_STORE_PASSWORD: ${{ secrets.MY_STORE_PASSWORD }}
          MY_STORE_FILE: my-release-key.jks

      - name: 7 - Oluşan APK'yı dışa aktar
        uses: actions/upload-artifact@v4
        with:
          name: GeziHaritam-APK
          path: app/build/outputs/apk/release/app-release.apk
