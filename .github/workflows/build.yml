name: Build APK

on:
  push:
    branches: [main, develop, feature/*]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Kodu çek
        uses: actions/checkout@v4

      - name: 2 - JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 3 - Android SDK
        uses: android-actions/setup-android@v3

      - name: 4 - Gradle cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: 5 - Secret uzunluğu kontrolü
        run: |
          echo "B64 len  = ${#DEBUG_KEYSTORE_B64}"
          echo "PWD len  = ${#DEBUG_KEYSTORE_PASSWORD}"
          echo "ALIAS    = ${DEBUG_KEY_ALIAS:-<EMPTY>}"
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 6 - Keystore yaz
        run: |
          mkdir -p app/android
          printf '%s' "$DEBUG_KEYSTORE_B64" | base64 -d > app/android/debug.keystore
          ls -lh app/android/debug.keystore
          file app/android/debug.keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}

      - name: 7 - keytool test
        run: |
          keytool -list -keystore app/android/debug.keystore \
            -storepass "$DEBUG_KEYSTORE_PASSWORD" \
            -keypass "$DEBUG_KEYSTORE_PASSWORD" \
            -alias "$DEBUG_KEY_ALIAS" -v | head -n 12
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 8 - gradle.properties oluştur
        run: |
          echo "MY_STORE_FILE=app/android/debug.keystore" > gradle.properties
          echo "MY_STORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}" >> gradle.properties
          echo "MY_KEY_ALIAS=${DEBUG_KEY_ALIAS}" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 9 - Temizlik (clean & klasör sil)
        run: |
          ./gradlew clean
          echo "📁 Siliniyor: app/build, build, ~/.gradle/caches/"
          rm -rf app/build
          rm -rf build
          rm -rf ~/.gradle/caches

      - name: 10 - APK derle (assembleRelease)
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info
        env:
          MY_STORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          MY_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      - name: 11 - APK'yı yükle (GitHub artefaktı)
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
