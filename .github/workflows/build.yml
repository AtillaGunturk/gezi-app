name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - uses: android-actions/setup-android@v3

    # Gradle cache + wrapper
    - uses: gradle/actions/setup-gradle@v3
      with:
        build-root-directory: .   # wrapper hangi klasördeyse

    # Manifest adımı (opsiyonel)
    - name: Process manifest (debug)
      run: |
        chmod +x gradlew
        ./gradlew --stacktrace :app:processReleaseMainManifest

    # APK oluştur
    - name: Assemble Release
      run: |
        chmod +x gradlew
        ./gradlew --stacktrace :app:assembleRelease

    # Çıktıyı yükle
    - uses: actions/upload-artifact@v4
      with:
        name: gezi-apk
        path: app/build/outputs/apk/release/app-release.apk
