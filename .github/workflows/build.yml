name: Build APK
on:
  push: {branches: [main]}
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - uses: android-actions/setup-android@v3

    # ✅ Gradle'ı kuruyoruz
    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.6

    # ✅ Sadece manifest işleme (hata ayıklama için)
    - name: Process manifest only (debugging)
      run: ./gradlew --stacktrace --info :app:processReleaseMainManifest

    # ✅ APK oluşturma (eğer manifest işlemesi başarılıysa)
    - name: Assemble Release
      if: ${{ success() }}
      run: ./gradlew assembleRelease

    - uses: actions/upload-artifact@v4
      with:
        name: gezi-apk
        path: app/build/outputs/apk/release/app-release.apk
