name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK Kur
        uses: android-actions/setup-android@v3

      - name: Gradle Cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: .
          cache-disabled: true

      - name: Manifesti işle (log için)
        run: |
          chmod +x gradlew
          ./gradlew :app:processReleaseMainManifest \
                     --no-daemon \
                     --stacktrace \
                     --info \
                     --debug | tail -n 100

      - name: Release APK oluştur
        if: ${{ success() }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease \
                     --no-daemon \
                     --stacktrace \
                     --info

      - name: Oluşan APK/AAB dosyalarını listele
        run: find app/build/outputs -type f | grep -E "\.(apk|aab)$" || true

      - name: APK'yı upload et
        uses: actions/upload-artifact@v4
        if: ${{ success() }}
        with:
          name: gezi-apk
          path: app/build/outputs/apk/release/app-release.apk
          # 6) APK oluştur
- name: Assemble Release
  if: ${{ success() }}
  run: ./gradlew :app:assembleRelease --no-daemon --stacktrace --info

# 🔍 6.5) Hangi dosyalar var? APK nereye gitti?
- name: Üretilen APK'yı tara
  run: find app/build/outputs -type f | grep -E '\.apk$' || true
