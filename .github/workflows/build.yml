name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1 - Kodu çek
        uses: actions/checkout@v4

      - name: 2 - JDK 17 kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 3 - Gradle önbelleğini sil (eski APK hataları için)
        run: |
          rm -rf app/build
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper

      - name: 4 - Gradle Wrapper ayarları
        run: chmod +x ./gradlew

      - name: 5 - Keystore dosyasını oluştur
        run: |
          echo "${{ secrets.MY_KEYSTORE_BASE64 }}" | base64 -d > my-release-key.jks

      - name: 6 - gradle.properties dosyasını oluştur
        run: |
          echo "MY_STORE_PASSWORD=${{ secrets.MY_STORE_PASSWORD }}" >> gradle.properties
          echo "MY_KEY_ALIAS=${{ secrets.MY_KEY_ALIAS }}" >> gradle.properties
          echo "MY_KEY_PASSWORD=${{ secrets.MY_KEY_PASSWORD }}" >> gradle.properties

      - name: 7 - APK üret
        run: ./gradlew assembleRelease

      - name: 8 - APK dosyasını dışa aktar
        uses: actions/upload-artifact@v4
        with:
          name: gezi-app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
