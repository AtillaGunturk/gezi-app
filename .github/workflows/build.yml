name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Kodu çek
    - uses: actions/checkout@v4

    # 2️⃣ JDK 17
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Android SDK
    - uses: android-actions/setup-android@v3

    # 4️⃣ Gradle cache (devre dışı)
    - uses: gradle/actions/setup-gradle@v3
      with:
        cache-disabled: true

    # 4.1 🔍 Secret uzunlukları
    - name: Secret uzunluğu kontrolü
      run: |
        echo "B64 len  = ${#DEBUG_KEYSTORE_B64}"
        echo "PWD len  = ${#DEBUG_KEYSTORE_PASSWORD}"
        echo "ALIAS    = ${DEBUG_KEY_ALIAS
