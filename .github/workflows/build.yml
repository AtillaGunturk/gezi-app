name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Kodu çek
      - name: Kodu çek
        uses: actions/checkout@v4

      # 2️⃣ Java 17 Kur
      - name: JDK 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Android SDK
      - name: Android SDK Kur
        uses: android-actions/setup-android@v3

      # 4️⃣ Gradle cache (devre dışı)
      - name: Gradle Cache (devre dışı)
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # 5️⃣ 🔑 Keystore dosyasını oluştur
      - name: Keystore dosyasını oluştur
        run: |
          mkdir -p app/android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > app/android/debug.keystore
          echo "✅ debug.keystore oluşturuldu: app/android/debug.keystore"
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
          - name: Dosya kontrolü
  run: |
    ls -l app/android/debug.keystore
    file app/android/debug.keystore

      # 6️⃣ 🧪 Keystore doğrulama
      - name: Keystore'u test et
        run: |
          keytool -list -keystore app/android/debug.keystore \
            -storepass "${DEBUG_KEYSTORE_PASSWORD}" \
            -alias "${DEBUG_KEY_ALIAS}" -v | head -n 20
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      # 7️⃣ gradle.properties dosyasını yaz
      - name: gradle.properties oluştur
        run: |
          cat <<EOF > gradle.properties
          MY_STORE_FILE=app/android/debug.keystore
          MY_STORE_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          MY_KEY_ALIAS=${DEBUG_KEY_ALIAS}
          MY_KEY_PASSWORD=${DEBUG_KEYSTORE_PASSWORD}
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}

      # 8️⃣ APK oluştur
      - name: Release APK oluştur
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --info

      # 9️⃣ APK'yı upload et
      - name: APK'yı upload et
        uses: actions/upload-artifact@v4
        with:
          name: gezi-signed-apk
          path: app/build/outputs/apk/release/app-release.apk
